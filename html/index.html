<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="/css/styles.css">
        <link rel="stylesheet" href="/css/login.css">
        <title>LOGIN</title>
    </head>


    <body>
        <header>
            <ul>
                <li class="logo-empresa"> <i class="bi bi-clipboard2-check-fill"></i></li>
                <li class="food-quality-sistem"> FOOD QUALITY SISTEM</li>
                <li class="nome-empresa"> NOME DA EMPRESA</li>
                <li class="sino"> <i class="bi bi-bell-fill"></i></li>
                <li class="user"><i class="bi bi-person-circle"></i></li>
            </ul>
        </header>


    <main>  
        <div class="titulo-login">
            <h1>USUÁRIO</h1>
            <h2>Bem-vindo ao Food Quality Sistem</h2>
            <h3> Insira suas informações para acessar o sistema:</h3>
        </div>



        <section>
            <fieldset>
                <legend>Login</legend>

                <label for="login"> Nome: </label>
                <input id="login" type="email"><br>

                <label for="senha">Senha:</label>
                <input id="senha" type="password"><br>
            </fieldset>
        </section>
        <div class="botoes-login">
            <a href="home.html" id="botao-add" class="btn-entrar">ENTRAR</a>
            <button type="submit" class="btn-esqueci">ESQUECI MINHA SENHA</button>
        </div>
    </main>
        


    <footer>
        <p>© 2026 Food Quality System</p>
        <p>Controle de Qualidade - Indústria de Alimentos</p>
        <p>Versão 1.0</p>
        </footer> 

    
    <script src="/js/login.js"></script>
    </body> 

</html>
